name: Footer Styles
description: Footer styles for the theme
type: section

form:
  fields:
    background:
      type: input.colorpicker
      label: Background
      default: "#ffffff"
    background-image:
      type: input.imagepicker
      label: Background Image
      default: ""      
    text-color:
      type: input.colorpicker
      label: Text Color
      default: "#030303"
    link-color:
      type: input.colorpicker
      label: Link Color
      default: "#030303"
    link-hover-color:
      type: input.colorpicker
      label: Link Hover Color
      default: "#c59d5f"
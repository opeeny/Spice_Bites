preset1:
  image: 'gantry-admin://images/preset1.png'
  description: 'Preset 1'
  colors:
    - '#4b5140'
    - '#ffe6b6'
  styles:
    base:
      text-color: '#444444'
      background: '#e0e0e0'
      heading-color: '#111010'
    accent:
      color-1: '#4b5140'
      color-2: '#ffe6b6'
    font:
      family-title: family=Marcellus
      family-default: Inter
    menustyle:
      font-families: '2'
      text-color: '#ffffff'
      text-color-active: 'rgba(255, 255, 255, 0.85)'
      item-gap: 30px
      item-height: 80px
      sublevel-background: '#ffffff'
      sublevel-text-color: '#6f6f6f'
      sublevel-background-hover: 'rgba(255, 255, 255, 0)'
      sublevel-text-color-hover: '#4b5140'
      sublevel-text-color-active: '#4b5140'
    top:
      background: '#ffe6b6'
      text-color: '#4b3e3a'
    navigation:
      background: '#4b5140'
      background-image: ''
      text-color: '#ffffff'
      overlay: 'rgba(0, 0, 0, 0.4)'
    hero:
      background: '#ebe6da'
      background-image: ''
      text-color: '#141515'
    slideshow:
      background: '#ffffff'
      background-image: ''
      text-color: '#141515'
    header:
      background: '#ffffff'
      background-image: ''
      text-color: '#141515'
    above:
      background: '#ebe6da'
      background-image: ''
      text-color: '#141515'
    feature:
      background: '#ffffff'
      background-image: ''
      text-color: '#141515'
    showcase:
      background: '#ffffff'
      background-image: ''
      text-color: '#141515'
    utility:
      background: '#ffffff'
      text-color: '#141515'
    main:
      background: '#ffffff'
      text-color: '#141515'
    expanded:
      background: '#f7f8fa'
      background-image: ''
      text-color: '#141515'
    extension:
      background: '#171816'
      background-image: 'gantry-media://booking-bg.png'
      text-color: '#ffffff'
    bottom:
      background: '#ebe6da'
      background-image: ''
      text-color: '#141515'
    below:
      background: '#ffffff'
      text-color: '#141515'
    footer:
      background: '#f0edea'
      background-image: ''
      text-color: '#5d5d5c'
      link-color: '#5d5d5c'
      link-hover-color: '#4b5140'
    copyright:
      background: '#f0edea'
      text-color: '#5d5d5c'
      link-color: '#5d5d5c'
      link-hover-color: '#4b5140'
    offcanvas:
      background: '#ffffff'
      text-color: '#141515'
      text-color-active: '#4b5140'
      toggle-color: '#ffffff'
      toggle-color-active: 'rgba(255, 255, 255, 0.8)'
      width: 13rem
      toggle-visibility: '1'
    breakpoints:
      large-desktop-container: 1600px
      desktop-container: 1200px
      tablet-container: 960px
      large-mobile-container: 640px
      mobile-menu-breakpoint: 960px
    menu:
      col-width: 180px
      animation: g-fade
      hide-on-mobile: '0'

